<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио разработчика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-bg"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 bg-[var(--bg)]/90 backdrop-blur-sm border-b border-[var(--border)]">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-[var(--fg)]"></div>
                <span class="font-mono text-sm text-[var(--fg-muted)] hidden sm:inline">portfolio.sys</span>
            </div>
            
            <div class="flex items-center gap-2">
                <button class="nav-link active" data-page="home" onclick="showPage('home')">
                    Главная
                </button>
                <button class="nav-link" data-page="projects" onclick="showPage('projects')">
                    Портфолио
                </button>
                
                <button class="theme-toggle ml-4" onclick="toggleTheme()" aria-label="Переключить тему">
                    <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 pt-24 pb-16 px-4">
        <div class="max-w-4xl mx-auto">

            <div id="page-home" class="page active">
                <header class="mb-12 reveal">
                    <div class="card p-8 relative">
                        <div class="flex flex-col md:flex-row gap-6 items-start">
                            <div class="w-24 h-24 bg-[var(--fg)] flex items-center justify-content-center text-white text-3xl font-bold shrink-0" style="display: grid; place-items: center;" id="avatar-initials">
                            </div>
                            <div class="flex-1">
                                <p class="font-mono text-xs text-[var(--accent)] mb-2">// SYSTEM.ONLINE</p>
                                <h1 class="text-3xl md:text-4xl font-bold mb-2" id="full-name">
                                </h1>
                                <p class="text-lg text-[var(--fg-muted)] font-medium mb-4" id="grade">
                                </p>
                                <div class="flex flex-wrap gap-2" id="contact-links">
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <section class="mb-12 reveal" style="transition-delay: 0.1s">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-1 h-6 bg-[var(--fg)]"></div>
                        <h2 class="text-xl font-bold uppercase tracking-wider">О себе</h2>
                    </div>
                    <div class="card p-6">
                        <div class="terminal-header mb-4">
                            <div class="terminal-dot bg-red-300"></div>
                            <div class="terminal-dot bg-yellow-300"></div>
                            <div class="terminal-dot bg-green-300"></div>
                            <span class="font-mono text-xs text-[var(--fg-muted)] ml-2">about.log</span>
                        </div>
                        <div class="font-mono text-sm leading-relaxed text-[var(--fg-muted)]" id="about-text">
                        </div>
                    </div>
                </section>

                <section class="mb-12 reveal" style="transition-delay: 0.2s">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-1 h-6 bg-[var(--fg)]"></div>
                        <h2 class="text-xl font-bold uppercase tracking-wider">Технологии</h2>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="skills-container">
                    </div>
                </section>

                <section class="reveal" style="transition-delay: 0.3s">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="card p-4 text-center">
                            <p class="text-2xl font-bold text-[var(--fg)]" id="stat-projects">0</p>
                            <p class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">Проектов</p>
                        </div>
                        <div class="card p-4 text-center">
                            <p class="text-2xl font-bold text-[var(--fg)]" id="stat-experience">0</p>
                            <p class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">года опыта в IT</p>
                        </div>
                        <div class="card p-4 text-center">
                            <p class="text-2xl font-bold text-[var(--fg)]" id="stat-technologies">0</p>
                            <p class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">Технологий</p>
                        </div>
                        <div class="card p-4 text-center flex flex-col items-center justify-center">
                            <div class="status-dot mb-2"></div>
                            <p class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">Available</p>
                        </div>
                    </div>
                </section>
            </div>

            <div id="page-projects" class="page">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-1 h-6 bg-[var(--fg)]"></div>
                        <h2 class="text-xl font-bold uppercase tracking-wider">Портфолио</h2>
                    </div>
                    <span class="font-mono text-sm text-[var(--fg-muted)]" id="projects-count">0 entries</span>
                </div>
                <div class="space-y-4" id="projects-list">
                </div>
            </div>

            <div id="page-project-detail" class="page">
                <button onclick="showPage('projects')" class="flex items-center gap-2 text-[var(--fg-muted)] hover:text-[var(--fg)] mb-6 transition-colors font-mono text-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    nazad_k_spisku
                </button>
                <div id="project-detail-content">
                </div>
            </div>

        </div>
    </main>

    <footer class="relative z-10 border-t border-[var(--border)] py-6 text-center bg-[var(--bg)]">
        <p class="font-mono text-xs text-[var(--fg-muted)]">
            system.status: <span class="text-[var(--accent)]">online</span> // 2026
        </p>
    </footer>
    <!-- <script src="main.js"></script> -->
    <script type="module" src="main.js"></script>
    
</body>
</html>
